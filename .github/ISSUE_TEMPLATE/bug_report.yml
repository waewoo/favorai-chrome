name: "🐛 Bug Report"
description: Report a problem or unexpected behavior in FavorAI Chrome
title: "[Bug]: "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## 🐛 Bug Report
        Thank you for helping improve FavorAI! Please fill in each section with as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: "📋 What happened?"
      description: "Describe the bug clearly. What did you observe?"
      placeholder: "When I click on… / After enabling…, the extension…"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "✅ Expected Behavior"
      description: "What did you expect to happen instead?"
      placeholder: "I expected the extension to…"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "🔁 Steps to Reproduce"
      description: "Provide a minimal, reproducible sequence of steps."
      placeholder: |
        1. Open the extension popup
        2. Click on "Organize Bookmarks"
        3. Select provider "Gemini Nano"
        4. Observe: spinner never stops / error toast appears
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: "🗂️ Area"
      description: "Which part of the extension is affected?"
      options:
        - AI / LLM Provider
        - Bookmark Management
        - UI / Popup
        - Settings
        - Background / Service Worker
        - Content Script
        - Sync / Storage
        - CI/CD / Build
        - Other
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: "🚨 Severity"
      options:
        - "🔴 Critical – extension unusable"
        - "🟠 High – major feature broken"
        - "🟡 Medium – degraded experience"
        - "🟢 Low – minor / cosmetic"
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: "🔄 Frequency"
      options:
        - "Always (100%)"
        - "Often (> 50%)"
        - "Sometimes (< 50%)"
        - "Rarely (hard to reproduce)"
    validations:
      required: true

  - type: input
    id: extension_version
    attributes:
      label: "🧩 Extension Version"
      description: "Found in chrome://extensions — e.g. 1.2.0"
      placeholder: "e.g. 1.2.0"
    validations:
      required: true

  - type: input
    id: chrome_version
    attributes:
      label: "🌐 Chrome Version"
      description: "Found in chrome://settings/help — e.g. 127.0.6533.89"
      placeholder: "e.g. 127.0.6533.89"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: "💻 Operating System"
      options:
        - Windows 11
        - Windows 10
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux
        - ChromeOS
        - Other
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: "🤖 AI Provider in Use"
      description: "Which LLM provider was active when the bug occurred?"
      options:
        - "Chrome Built-in (Gemini Nano)"
        - "OpenAI"
        - "Anthropic"
        - "Gemini (API)"
        - "Demo / Deterministic mode"
        - "None / Not applicable"
        - "Unknown"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: "📎 Logs / Screenshots / Console Errors"
      description: "Paste relevant console errors (DevTools → Console) or attach screenshots."
      placeholder: |
        ```
        Uncaught TypeError: Cannot read properties of undefined (reading 'dispatch')
            at background.js:42
        ```
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: "🔗 Additional Context / Related Issues"
      placeholder: |
        - Related: #18
        - Workaround: disabling setting X fixes it temporarily
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: "☑️ Pre-submission Checklist"
      options:
        - label: "I searched existing issues and this is not a duplicate"
          required: true
        - label: "I can reliably reproduce this bug with the steps above"
          required: true
        - label: "I am using the latest version of the extension"
          required: false
