name: E2E Tests (manual)

on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Test suite: all | ui | integration"
        required: true
        default: all
        type: choice
        options:
          - all
          - ui
          - integration

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'

    - name: Install dependencies
      run: make install-ci

    - name: Install Playwright browsers
      run: npx playwright install chromium --with-deps

    - name: Install Xvfb
      run: sudo apt-get install -y xvfb

    - name: Run E2E tests
      env:
        SUITE: ${{ inputs.suite }}
      run: |
        case "$SUITE" in
          ui)           xvfb-run --auto-servernum -- make test-e2e-ui ;;
          integration)  xvfb-run --auto-servernum -- make test-e2e-integration ;;
          *)            xvfb-run --auto-servernum -- make test-e2e ;;
        esac

    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report-${{ inputs.suite }}
        path: playwright-report/
        retention-days: 7
