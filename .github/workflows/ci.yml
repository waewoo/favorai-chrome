name: FavorAI Extension CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-lint:
    name: Quality / Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6

    - uses: ./.github/actions/bootstrap-node

    - name: Run ESLint with GitHub annotations
      run: |
        mkdir -p reports
        set +e
        npm run lint -- --format json --output-file reports/eslint.json
        lint_exit_code=$?
        node scripts/eslint-github-report.mjs reports/eslint.json
        exit $lint_exit_code

    - name: Upload ESLint report
      id: upload-eslint-report
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: eslint-report
        path: reports/eslint.json
        if-no-files-found: warn
        retention-days: 7

    - name: Publish lint summary
      if: always()
      run: |
        {
          echo "## Lint"
          echo ""
          if [ -n "${{ steps.upload-eslint-report.outputs.artifact-url }}" ]; then
            echo "- Artifact: [eslint-report](${{ steps.upload-eslint-report.outputs.artifact-url }})"
          else
            echo "- Artifact: not available because no JSON report was produced."
          fi
          echo "- Details: GitHub annotations appear in the run log."
        } >> "$GITHUB_STEP_SUMMARY"

  quality-unit-tests:
    name: Quality / Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write

    steps:
    - uses: actions/checkout@v6

    - uses: ./.github/actions/bootstrap-node

    - name: Run unit tests with coverage
      run: make test-coverage

    - name: Upload coverage report
      id: upload-coverage-report
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: coverage-report
        path: coverage/
        retention-days: 7

    - name: Upload Vitest report
      id: upload-vitest-report
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: vitest-report
        path: reports/unit-tests.xml
        if-no-files-found: warn
        retention-days: 7

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        files: ./coverage/lcov.info
        fail_ci_if_error: true
        use_oidc: true

    - name: Publish test summary
      if: always()
      run: |
        {
          echo "## Unit Tests"
          echo ""
          if [ -n "${{ steps.upload-coverage-report.outputs.artifact-url }}" ]; then
            echo "- Coverage artifact: [coverage-report](${{ steps.upload-coverage-report.outputs.artifact-url }})"
          else
            echo "- Coverage artifact: not available."
          fi
          if [ -n "${{ steps.upload-vitest-report.outputs.artifact-url }}" ]; then
            echo "- Vitest artifact: [vitest-report](${{ steps.upload-vitest-report.outputs.artifact-url }})"
          else
            echo "- Vitest artifact: not available because no JUnit report was produced."
          fi
          echo "- Details: Vitest annotations appear in the run log."
        } >> "$GITHUB_STEP_SUMMARY"

  quality-static-analysis:
    name: Quality / Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [quality-lint, quality-unit-tests]
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6

    - uses: ./.github/actions/bootstrap-node

    - name: Run static scan
      run: make static-scan

    - name: Publish static scan summary
      if: always()
      run: |
        {
          echo "## Static Scan"
          echo ""
          echo "- Details: run \`make static-scan\` or \`make quality\` locally for the same scan."
        } >> "$GITHUB_STEP_SUMMARY"

  security-audit:
    name: Security / Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [quality-lint, quality-unit-tests, quality-static-analysis]
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v6

    - uses: ./.github/actions/bootstrap-node

    - name: Run security scan
      run: make security

    - name: Publish security summary
      if: always()
      run: |
        {
          echo "## Security Scan"
          echo ""
          echo "- Details: run \`make security\` for the complete output."
        } >> "$GITHUB_STEP_SUMMARY"

  security-mutation:
    name: Security / Mutation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [quality-lint, quality-unit-tests]
    permissions:
      contents: read
    # Run on every push to main; on PRs only if the 'run-mutation' label is set.
    # Mutation takes ~5 min - skip it on doc/config-only PRs to save CI minutes.
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'run-mutation')

    steps:
    - uses: actions/checkout@v6

    - uses: ./.github/actions/bootstrap-node

    - name: Run mutation tests
      run: make test-mutation

    - name: Upload mutation report
      id: upload-mutation-report
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: mutation-report
        path: reports/mutation/mutation.html
        retention-days: 30

    - name: Publish mutation summary
      if: always()
      run: |
        {
          echo "## Mutation Testing"
          echo ""
          if [ -n "${{ steps.upload-mutation-report.outputs.artifact-url }}" ]; then
            echo "- Artifact: [mutation-report](${{ steps.upload-mutation-report.outputs.artifact-url }})"
          else
            echo "- Artifact: not available because no HTML report was produced."
          fi
          echo "- Details: inspect the HTML report for surviving mutants."
        } >> "$GITHUB_STEP_SUMMARY"
