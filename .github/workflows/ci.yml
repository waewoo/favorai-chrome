name: FavorAI Extension CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'

    - name: Install dependencies
      run: make install-ci

    - name: Run Linter
      run: make lint

    - name: Run Unit Tests with Coverage
      run: make test-coverage

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage/
        retention-days: 7

    - name: Run Security Scan
      run: make security

  mutation-testing:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-and-test
    # Run on every push to main; on PRs only if the 'run-mutation' label is set.
    # Mutation takes ~5 min — skip it on doc/config-only PRs to save CI minutes.
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.labels.*.name, 'run-mutation')

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'

    - name: Install dependencies
      run: make install-ci

    - name: Run Mutation Tests
      run: make test-mutation

    - name: Upload mutation report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: mutation-report
        path: reports/mutation/mutation.html
        retention-days: 30
