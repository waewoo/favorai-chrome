<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FavorAI</title>
  <link rel="stylesheet" href="fonts/fonts.css">
  <style>
    :root {
      --bg-dark: #090a0f;
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --accent-color: #6366f1;
      --success-color: #10b981;
      --error-color: #ef4444;
      --font-family: 'Plus Jakarta Sans', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 420px;
      font-family: var(--font-family);
      background-color: var(--bg-dark);
      color: var(--text-main);
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px 8px;
      border-bottom: 1px solid var(--border-color);
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-left img { width: 22px; height: 22px; border-radius: 4px; }
    .header-left h1 { font-size: 14px; font-weight: 700; letter-spacing: -0.3px; }
    .btn-advanced {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(99,102,241,0.12);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 6px;
      color: #818cf8;
      font-size: 10px;
      font-weight: 600;
      font-family: var(--font-family);
      padding: 4px 9px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .btn-advanced:hover {
      background: rgba(99,102,241,0.22);
      border-color: rgba(99,102,241,0.5);
    }

    /* ── Main content ── */
    .content { padding: 12px 14px 14px; }

    /* ── Tab details box ── */
    .tab-box {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 9px 10px;
      margin-bottom: 10px;
    }
    .tab-box label {
      font-size: 10px;
      color: var(--text-muted);
      display: block;
      margin-bottom: 4px;
    }
    .tab-box input[type="text"] {
      width: 100%;
      background: rgba(0,0,0,0.25);
      border: 1px solid var(--border-color);
      border-radius: 5px;
      padding: 5px 8px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-main);
      font-family: var(--font-family);
      outline: none;
      margin-bottom: 5px;
      transition: border-color 0.15s;
    }
    .tab-box input[type="text"]:focus {
      border-color: rgba(99,102,241,0.5);
    }
    .tab-url {
      font-size: 10px;
      color: var(--text-muted);
      font-family: monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Buttons ── */
    .btn-row { display: flex; gap: 7px; margin-bottom: 10px; }
    .btn {
      flex: 1;
      padding: 8px 10px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 600;
      font-family: var(--font-family);
      cursor: pointer;
      border: none;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: #fff;
      box-shadow: 0 2px 10px rgba(99,102,241,0.35);
    }
    .btn-primary:hover:not(:disabled) { opacity: 0.9; }
    .btn-alt {
      flex: 0 0 auto;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      font-size: 11px;
      padding: 8px 10px;
    }
    .btn-alt:hover:not(:disabled) {
      background: rgba(255,255,255,0.08);
      color: var(--text-main);
    }
    .btn-success {
      width: 100%;
      padding: 9px;
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      border-radius: 7px;
      font-family: var(--font-family);
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 10px rgba(16,185,129,0.3);
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-success:hover:not(:disabled) { opacity: 0.9; }
    .btn-success:active { transform: scale(0.98); }
    .btn-success:disabled { opacity: 0.45; cursor: not-allowed; }
    .hidden { display: none !important; }

    /* ── Suggestion card ── */
    .suggestion-card {
      background: rgba(99,102,241,0.06);
      border: 1px solid rgba(99,102,241,0.25);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
    .suggestion-label {
      font-size: 9px;
      font-weight: 700;
      color: #818cf8;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .suggestion-row {
      display: flex;
      align-items: center;
      gap: 7px;
      border-radius: 6px;
      padding: 7px 9px;
      margin-bottom: 7px;
    }
    .suggestion-row.bookmark-row {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
    }
    .suggestion-row.folder-row {
      background: rgba(16,185,129,0.07);
      border: 1px solid rgba(16,185,129,0.2);
      margin-bottom: 8px;
    }
    .suggestion-row .icon { font-size: 14px; flex-shrink: 0; }
    .suggestion-row .info { min-width: 0; }
    .suggestion-row .info .sublabel {
      font-size: 9px;
      color: var(--text-muted);
      margin-bottom: 1px;
    }
    .suggestion-row.folder-row .info .sublabel { color: #6ee7b7; }
    .suggestion-name {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .suggestion-folder {
      font-size: 12px;
      font-weight: 700;
      color: #10b981;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .suggestion-reason {
      font-size: 10px;
      color: var(--text-muted);
      line-height: 1.4;
    }

    /* ── Error banner ── */
    .error-banner {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 7px;
      padding: 8px 10px;
      font-size: 11px;
      color: #fca5a5;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    /* ── Loading state ── */
    .loading-dots::after {
      content: '';
      animation: dots 1.2s steps(3, end) infinite;
    }
    @keyframes dots {
      0%   { content: ''; }
      33%  { content: '.'; }
      66%  { content: '..'; }
      100% { content: '...'; }
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 6px 14px 8px;
      border-top: 1px solid var(--border-color);
    }
    .footer button {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 9px;
      cursor: pointer;
      font-family: var(--font-family);
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <img src="icons/icon48.png" alt="FavorAI" />
      <h1>FavorAI</h1>
    </div>
    <button class="btn-advanced" id="btnOpenAdvanced" data-i18n="lightOpenAdvancedTitle" data-i18n-attr="title" data-i18n="lightOpenAdvanced">
      ⚡ Mode Avancé
    </button>
  </div>

  <!-- MAIN CONTENT -->
  <div class="content">

    <!-- Error banner (hidden by default) -->
    <div id="errorBanner" class="error-banner hidden"></div>

    <!-- Tab details -->
    <div class="tab-box">
      <label for="lightBookmarkTitle" data-i18n="lightBookmarkLabel"></label>
      <input type="text" id="lightBookmarkTitle" data-i18n="lightLoading" data-i18n-attr="placeholder" />
      <div class="tab-url" id="lightTabUrl">-</div>
    </div>

    <!-- Action buttons -->
    <div class="btn-row">
      <button class="btn btn-primary" id="btnLightAnalyze" data-i18n="lightAnalyzeBtn" disabled></button>
      <button class="btn btn-alt hidden" id="btnLightAlternative" data-i18n="lightAlternativeBtn" title="Demander une autre suggestion"></button>
    </div>

    <!-- Manual save button -->
    <button class="btn btn-alt" id="btnLightManualSave" data-i18n="lightManualSaveBtn" style="width: 100%; margin-bottom: 10px;"></button>

    <!-- Manual save section (hidden by default) -->
    <div id="lightManualSection" class="suggestion-card hidden" style="margin-bottom: 10px;">
      <div class="suggestion-label" data-i18n="lightManualSaveTitle"></div>

      <div style="display: flex; flex-direction: column; gap: 8px;">
        <div>
          <label for="lightManualTitle" style="font-size: 10px; color: var(--text-muted); display: block; margin-bottom: 4px;" data-i18n="bookmarkTitleLabel"></label>
          <input type="text" id="lightManualTitle" style="width: 100%; background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.1); border-radius: 5px; padding: 6px 8px; font-size: 11px; color: var(--text-main); font-family: var(--font-family); outline: none;" />
        </div>

        <div>
          <label for="lightManualFolder" style="font-size: 10px; color: var(--text-muted); display: block; margin-bottom: 4px;" data-i18n="lightFolderLabel"></label>
          <select id="lightManualFolder" style="width: 100%; background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.1); border-radius: 5px; padding: 6px 8px; font-size: 11px; color: var(--text-main); font-family: var(--font-family); outline: none;">
            <option value="" data-i18n="lightSelectFolder"></option>
          </select>
        </div>

        <button class="btn btn-success" id="btnLightManualSaveConfirm" data-i18n="confirmSaveBtn" style="margin-top: 4px;"></button>
      </div>
    </div>

    <!-- Duplicate warning -->
    <div id="lightDuplicateWarning" style="
      display: none;
      background: rgba(239, 68, 68, 0.15);
      border: 2px solid #ef4444;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
      font-size: 11px;
      color: #fca5a5;
      line-height: 1.5;
    ">
      <div style="font-weight: 700; margin-bottom: 4px;">⚠️ Ce lien existe déjà</div>
      <div id="lightDuplicateLocation" style="color: #fda29b; margin-bottom: 6px;"></div>
      <div style="font-size: 10px; color: #f87171;">Vous devez choisir un emplacement différent pour éviter les doublons</div>
    </div>

    <!-- AI Suggestion card -->
    <div id="lightSuggestionCard" class="suggestion-card hidden">
      <div class="suggestion-label" data-i18n="lightSuggestionLabel"></div>

      <div class="suggestion-row bookmark-row">
        <span class="icon">🔖</span>
        <div class="info">
          <div class="sublabel" data-i18n="lightBookmarkLabel"></div>
          <div class="suggestion-name" id="lightSuggestionName"></div>
        </div>
      </div>

      <div class="suggestion-row folder-row">
        <span class="icon" id="lightFolderIcon">📂</span>
        <div class="info">
          <div class="sublabel" id="lightFolderLabel" data-i18n="lightFolderLabel"></div>
          <div class="suggestion-folder" id="lightFolderPath"></div>
        </div>
      </div>

      <div class="suggestion-reason" id="lightSuggestionReason"></div>
    </div>

    <!-- Confirm button -->
    <button class="btn-success hidden" id="btnLightConfirm" data-i18n="lightConfirmBtn"></button>

  </div>

  <!-- FOOTER -->
  <div class="footer">
    <button id="btnLightPrivacy" data-i18n="lightPrivacyBtn"></button>
  </div>

  <!-- Toast notification -->
  <div id="lightToast" style="
    position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: rgba(30,32,48,0.97); border: 1px solid rgba(99,102,241,0.35);
    border-radius: 8px; padding: 8px 16px; font-size: 11px; color: var(--text-main);
    white-space: nowrap; opacity: 0; transition: opacity 0.25s, transform 0.25s;
    pointer-events: none; z-index: 999;
  "></div>

  <script src="popup-light.js"></script>
</body>
</html>
