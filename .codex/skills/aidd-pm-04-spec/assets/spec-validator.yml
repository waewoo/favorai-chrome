# Checklist a spec is validated against.
# Each criterion is independently scored. Required criteria must be `fulfilled` for the spec to pass.

criteria:
  - id: target
    description: A single clear sentence stating what the system must achieve. Unambiguous, verifiable, single target (not multiple disguised as one).
    required: true
    weight: 25

  - id: hard_constraints
    description: Non-negotiable constraints listed explicitly. Each constraint is concrete and testable, not vague.
    required: true
    weight: 20

  - id: non_goals
    description: Out-of-scope items listed explicitly. Reader knows what NOT to build.
    required: true
    weight: 20

  - id: done_when
    description: Completion conditions listed, each an observable outcome a user or the system can be seen producing. Verifiable by observation, not a command and not a feeling.
    required: true
    weight: 25

  - id: stakeholders
    description: Decider, owner, and consumer roles identified. Optional but encouraged for non-trivial specs.
    required: false
    weight: 5

  - id: context
    description: Relevant background or links provided when needed for downstream decisions.
    required: false
    weight: 5

hard_thresholds:
  any_required_unfulfilled: invalid
  target_unclear_or_multiple_targets: invalid
  done_when_unverifiable: invalid
  contains_implementation_details: invalid

scoring:
  pass_threshold: 90
  notes: |
    A spec is valid when every required criterion is fulfilled AND the weighted score
    is at or above the pass_threshold. Hard thresholds force `invalid` regardless of score.
    Implementation details (libraries, patterns, file layout) belong to the plan, not the spec.
